# Sidecar fragment for the postgres plugin. Merged into the generated compose when enabled.
services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - ../Backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
