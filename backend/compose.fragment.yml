# Sidecar fragment for the postgres plugin. Merged into the generated compose when enabled.
services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - ../Backend/.env
    # internal-by-default (Fix-KIT-07): the backend reaches this over the compose network as `db:5432`,
    # so NO host port is published. If a dev workflow needs host access, add one allocated from the
    # registry (PiKaOs-Docs/docs/architecture/ports.md) — never hardcode it here. Prod external exposure
    # is a host-firewall decision, not a loopback bind (Fix-NET-01).
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
